<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- VERY BASIC CSS -->
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f4f8;
            padding: 20px;
        }
        .box {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            border: 2px solid #ccc;
            border-radius: 10px;
            max-width: 400px;
            margin: 20px auto;
            padding: 20px;
        }
        img {
            width: 120px;
            height: 120px;
        }
        #winner {
            color: #d9534f;
            border-top: 1px solid #eee;
            padding-top: 15px;
            width: 100%;
        }
        input, button {
            padding: 8px;
            font-size: 16px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <h1>Ride Your Luck.... Battleee </h1>
    <label for="pokinumber"> pick your pokemon </label>
    <input type="number" id="pokinumber">
    <button onclick="pokibattle()" id="battle"> Battle </button>
    <div class="box">
        <h3>player pokemon </h3>
        <h4 id="pokemon_name_player"></h4>
        <img src="" id="image1">
        <h5 id="weight1"></h5>
        <h3> Computer pokemon</h3>
        <h4 id="comp_pokemon_name"></h4>
        <img src="" id="image2">
        <h5 id="weight2"></h5>

        <h2 id="winner"></h2>
    </div>

    <script>
    
        async function pokibattle(params) {
            const poknumber = document.getElementById("pokinumber")
            const number = poknumber.value
            const comp_number = Math.floor(Math.random()*1302)
            try{
                const response_player = await fetch(`https://pokeapi.co/api/v2/pokemon/${number}/`)
                
                if(!response_player.ok){
                    throw new Error("unable to fetch details..") // Fixed error constructor syntax typo
                }
                const data = await response_player.json()
                const response_computer = await fetch(`https://pokeapi.co/api/v2/pokemon/${comp_number}/`)
                const comp_data = await response_computer.json()
                const player_pokemon_weight = data.weight
                const computer_pokemon_weight = comp_data.weight
                const player_pokemon_name = document.getElementById("pokemon_name_player")
                player_pokemon_name.textContent = data.name 
                const comp_pokemon_name = document.getElementById("comp_pokemon_name")
                comp_pokemon_name.textContent = comp_data.name 


                const image_1 = data.sprites.front_default
                document.getElementById("image1").src = image_1
                const image_2 = comp_data.sprites.front_default
                document.getElementById("image2").src = image_2

                const winner = document.getElementById("winner")

                const weight1 = document.getElementById("weight1")
                weight1.textContent = "Weight: " + data.weight // Added a small label text for clarity
                const weight2 = document.getElementById("weight2")
                weight2.textContent = "Weight: " + comp_data.weight // Added a small label text for clarity

            if(player_pokemon_weight < computer_pokemon_weight)
            {
                winner.textContent = "Winner : Computer "
            }
            else
            {
                winner.textContent = "Winner : player"
            }

            }
            
            catch(error)
            {
                console.error(error); // Logs error so it doesn't fail silently
            }
            

            }
    </script>

</body>
</html>
